<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Mon Espace SocialAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d14;--ink2:#1a1a26;--ink3:#252533;
  --border:#3a3a50;--border2:#4a4a64;
  --chalk:#f5f4f0;--chalk2:#c8c6be;--chalk3:#7a7870;
  --rose:#ff4d6d;--rose2:#cc2244;--mint:#00d4aa;--amber:#ffb340;
  --r:10px;--r2:16px;--r3:24px;
}
body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--ink);color:var(--chalk);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* Background subtle */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(255,77,109,0.06) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(255,179,64,0.04) 0%,transparent 50%);
  pointer-events:none;
}

.card{
  width:100%;max-width:400px;
  background:var(--ink2);border:1px solid var(--border);
  border-radius:var(--r3);padding:36px;
  position:relative;z-index:1;
  box-shadow:0 24px 64px rgba(0,0,0,0.4);
}

.logo{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.logo-icon{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--rose),var(--amber));
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--chalk3);letter-spacing:0.8px;text-transform:uppercase}

.title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--chalk3);margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:16px}
.form-label{
  font-size:11px;color:var(--chalk3);margin-bottom:6px;display:block;
  text-transform:uppercase;letter-spacing:0.8px;font-weight:500;
}
.form-input{
  width:100%;background:var(--ink3);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 14px;color:var(--chalk);font-size:14px;
  font-family:'Bricolage Grotesque',sans-serif;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.form-input:focus{
  border-color:var(--rose);outline:none;
  box-shadow:0 0 0 3px rgba(255,77,109,0.1);
}
.form-input::placeholder{color:var(--chalk3)}

.btn-login{
  width:100%;padding:12px;font-size:14px;font-weight:600;
  border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--rose),var(--rose2));
  color:white;cursor:pointer;letter-spacing:0.2px;
  transition:all 0.2s;margin-top:8px;
  font-family:'Bricolage Grotesque',sans-serif;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,77,109,0.3)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}

.error-msg{
  background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);
  border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--rose);
  margin-bottom:16px;display:none;
}

.footer-note{
  text-align:center;font-size:11px;color:var(--chalk3);margin-top:20px;
}

.spinner{
  display:inline-block;width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);border-top-color:white;
  animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">SocialAI</div>
      <div class="logo-sub">Espace client</div>
    </div>
  </div>

  <div class="title">Connexion</div>
  <div class="subtitle">Accédez à votre espace pour consulter et gérer vos publications.</div>

  <div class="error-msg" id="error-msg">Email ou mot de passe incorrect.</div>

  <div class="form-group">
    <label class="form-label">Adresse email</label>
    <input class="form-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn-login" id="btn-login" onclick="login()">
    Se connecter →
  </button>

  <div class="footer-note">
    Problème de connexion ? Contactez votre community manager.
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errMsg = document.getElementById('error-msg');

  if (!email || !password) {
    errMsg.textContent = 'Veuillez remplir tous les champs.';
    errMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connexion…';
  errMsg.style.display = 'none';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await r.json();

    if (!r.ok) {
      errMsg.textContent = data.error || 'Email ou mot de passe incorrect.';
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
      return;
    }

    // Sauvegarder le token et l'ID client
    localStorage.setItem('portal_token', data.token);
    localStorage.setItem('portal_client_id', data.clientId);
    localStorage.setItem('portal_client_name', data.clientName);

    // Rediriger vers l'espace client
    window.location.href = `/client.html?client=${data.clientId}`;

  } catch (e) {
    errMsg.textContent = 'Erreur de connexion. Réessayez.';
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}

// Si déjà connecté, rediriger directement
const token = localStorage.getItem('portal_token');
const clientId = localStorage.getItem('portal_client_id');
if (token && clientId) {
  fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.ok ? window.location.href = `/client.html?client=${clientId}` : null)
    .catch(() => null);
}
</script>
</body>
</html>
