<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romi — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070f;--bg2:#0f0f1a;--bg3:#161622;--border:#2a2a3e;--text:#f0f0fa;--text2:#8888aa;--text3:#4a4a6a;--violet:#7c3aed;--violet2:#5b21b6;--rose:#f43f5e;--r:10px;--r2:16px;--r3:24px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(124,58,237,0.08),transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(244,63,94,0.05),transparent 50%);pointer-events:none}
.card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:36px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--violet),var(--rose));display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.8px;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.form-input:focus{border-color:var(--violet);outline:none;box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.form-input::placeholder{color:var(--text3)}
.input-wrap{position:relative}
.input-wrap .form-input{padding-right:44px}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px}
.btn-main{width:100%;padding:12px;font-size:14px;font-weight:600;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--violet),var(--violet2));color:white;cursor:pointer;transition:all 0.2s;margin-top:8px;font-family:'DM Sans',sans-serif}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,0.35)}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.error-msg{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.3);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--rose);margin-bottom:16px;display:none}
.footer-note{text-align:center;font-size:11px;color:var(--text3);margin-top:20px}
.spinner{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:white;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤝</div>
    <div>
      <div class="logo-name">Romi</div>
      <div class="logo-sub">Prospection Intelligente</div>
    </div>
  </div>
  <div class="title">Connexion</div>
  <div class="subtitle">Accédez à votre espace de prospection.</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label class="form-label">Adresse email</label>
    <input class="form-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <div class="input-wrap">
      <input class="form-input" type="password" id="password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') login()">
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1">👁</button>
    </div>
  </div>
  <button class="btn-main" id="btn-login" onclick="login()">Se connecter →</button>
  <div class="footer-note">Problème ? Contactez l'administrateur.</div>
</div>

<script>
function togglePw() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const err      = document.getElementById('error-msg');

  if (!email || !password) { err.textContent='Remplissez tous les champs.'; err.style.display='block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connexion…';
  err.style.display = 'none';

  try {
    const r = await fetch('/api/romi-auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error||'Identifiants incorrects.'; err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter →'; return; }

    localStorage.setItem('romi_token',     data.token);
    localStorage.setItem('romi_user_name', data.userName);
    localStorage.setItem('romi_user_role', data.userRole);
    window.location.href = '/romi.html';
  } catch {
    err.textContent='Erreur de connexion.'; err.style.display='block';
    btn.disabled=false; btn.textContent='Se connecter →';
  }
}

// Redirection si déjà connecté
const t = localStorage.getItem('romi_token');
if (t) fetch('/api/romi-auth/me',{headers:{Authorization:`Bearer ${t}`}}).then(r=>{if(r.ok)window.location.href='/romi.html'}).catch(()=>{});
</script>
</body>
</html>
