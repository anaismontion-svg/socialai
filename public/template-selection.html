<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Choisissez vos templates — SocialAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f4f1;min-height:100vh;color:#1a1a1a}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:40}
.topbar-left h2{font-size:17px;font-weight:700}
.topbar-left p{font-size:12px;color:#999;margin-top:2px}
.topbar-right{display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-family:inherit}
.btn-ghost{background:#f0f0f0;color:#555}
.btn-ghost:hover{background:#e8e8e8}
.btn-validate{font-weight:700;font-size:13px;padding:9px 22px;border-radius:8px;transition:all .2s}
.btn-validate:disabled{background:#e0e0e0;color:#aaa;cursor:not-allowed}
.progress-bar{background:#fff;border-bottom:1px solid #eee;padding:10px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:57px;z-index:39}
.progress-track{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-label{font-size:12px;white-space:nowrap;font-weight:400;color:#aaa}
.progress-label.ready{font-weight:700}
.counter{font-size:12px;color:#888;white-space:nowrap}
.content{padding:16px 24px 120px}
.style-group{margin-bottom:26px}
.style-label{font-size:10px;font-weight:700;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.cards-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.card{background:#fff;border-radius:10px;border:2px solid transparent;cursor:pointer;overflow:hidden;transition:all .18s;position:relative;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.card.sel{transform:translateY(-3px)}
.svg-wrap{width:100%;aspect-ratio:9/16;overflow:hidden;display:block;line-height:0}
.svg-wrap svg{width:100%;height:100%}
.card-foot{padding:6px 8px 8px}
.card-tid{font-size:11px;font-weight:700}
.check-badge{position:absolute;top:7px;right:7px;z-index:2;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;display:none}
.card.sel .check-badge{display:flex}
.zoom-btn{position:absolute;top:7px;left:7px;z-index:2;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:11px;color:#555;display:flex;align-items:center;justify-content:center}
.float-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:50px;box-shadow:0 8px 30px rgba(0,0,0,.25);display:none;align-items:center;gap:16px;z-index:50;white-space:nowrap}
.float-bar.show{display:flex}
.float-validate{padding:8px 20px;border-radius:30px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.float-validate:disabled{background:#555;cursor:not-allowed}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;overflow:hidden;width:300px;max-height:90vh;display:flex;flex-direction:column}
.modal-hd{padding:10px 14px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-hd-title{font-weight:700;font-size:14px}
.modal-hd-actions{display:flex;gap:7px}
.modal-sel-btn{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.modal-close{padding:6px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px}
.modal-body{overflow-y:auto;padding:12px}
.modal-body svg{width:100%}
.error-banner{margin:12px 24px 0;padding:10px 14px;background:#fff0f0;border:1px solid #fcc;border-radius:8px;font-size:13px;color:#c00;display:none}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#999;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.cards-row{grid-template-columns:repeat(3,1fr)}.topbar-right .btn-ghost{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h2>Choisissez vos templates stories</h2>
    <p>Aria utilisera ces designs pour vos stories quotidiennes — minimum 15 requis</p>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="selectAll()">Tout sélectionner</button>
    <button class="btn btn-ghost" onclick="clearAll()">Effacer</button>
    <button class="btn btn-validate" id="btn-validate" disabled onclick="handleValidate()">0 / 15 minimum</button>
  </div>
</div>

<div class="progress-bar">
  <span class="counter" id="counter">0 sélectionné</span>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-label" id="progress-label">Encore 15</span>
</div>

<div class="error-banner" id="error-banner"></div>
<div class="content" id="content"></div>

<div class="float-bar" id="float-bar">
  <span id="float-count">0 template sélectionné</span>
  <button class="float-validate" id="float-validate" disabled onclick="handleValidate()">Encore 15</button>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <span class="modal-hd-title" id="modal-title">Template</span>
      <div class="modal-hd-actions">
        <button class="modal-sel-btn" id="modal-sel-btn" onclick="toggleFromModal()">Sélectionner ✓</button>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <span style="font-size:14px;color:#666">Enregistrement en cours...</span>
</div>

<script>
const MIN = 15;
let selected = new Set();
let modalId = null;
let CLIENT = {
  primaryColor:'#C9A98A', secondaryColor:'#2D2D2D', accentColor:'#F5EDE3',
  businessName:'Mon Commerce', tagline:'Votre slogan',
  website:'www.monsite.fr', hashtag:'#monbusiness'
};
let CLIENT_ID = null;

async function initClient() {
  const params = new URLSearchParams(window.location.search);
  CLIENT_ID = params.get('clientId') || localStorage.getItem('socialai_client_id');

  if (CLIENT_ID) {
    try {
      const res = await fetch('/api/branding/client/' + CLIENT_ID);
      if (res.ok) {
        const data = await res.json();
        if (data.primary_color)   CLIENT.primaryColor   = data.primary_color;
        if (data.secondary_color) CLIENT.secondaryColor = data.secondary_color;
        if (data.accent_color)    CLIENT.accentColor    = data.accent_color;
        if (data.business_name)   CLIENT.businessName   = data.business_name;
        if (data.tagline)         CLIENT.tagline        = data.tagline;
        if (data.website)         CLIENT.website        = data.website;
        if (data.hashtag)         CLIENT.hashtag        = data.hashtag;
      }
    } catch(e) {
      console.warn('Branding non chargé:', e);
    }
  }

  buildUI();
  updateUI();
}

function ck(n,a,b){a=a||'#e8e8e8';b=b||'#f2f2f2';return`<defs><pattern id="p${n}" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="${a}"/><rect x="5" y="5" width="5" height="5" fill="${a}"/><rect x="5" width="5" height="5" fill="${b}"/><rect y="5" width="5" height="5" fill="${b}"/></pattern></defs>`}

function trunc(str,max){return(str||'').length>max?(str||'').substring(0,max)+"…":(str||''")}
function truncUp(str,max){return(str||'').toUpperCase().length>max?(str||'').toUpperCase().substring(0,max)+"…":(str||'').toUpperCase()}

const STYLES = [
  {id:'1', label:'Minimaliste Bande',     ids:['T01','T02','T03','T04','T05']},
  {id:'2', label:'Géométrique Organique', ids:['T06','T07','T08','T09','T10']},
  {id:'3', label:'Éditorial Contrasté',   ids:['T11','T12','T13','T14','T15']},
  {id:'4', label:'Fluide & Dynamique',    ids:['T16','T17','T18','T19','T20']},
  {id:'5', label:'Graphique Bold',        ids:['T21','T22','T23','T24','T25']},
  {id:'6', label:'Soft Premium',          ids:['T26','T27','T28','T29','T30']},
];

function buildUI() {
  document.getElementById('content').innerHTML = STYLES.map(style => `
    <div class="style-group">
      <div class="style-label">Style ${style.id} — ${style.label}</div>
      <div class="cards-row">
        ${style.ids.map(id => `
          <div class="card" id="card-${id}" onclick="toggle('${id}')">
            <div class="check-badge" id="badge-${id}">✓</div>
            <button class="zoom-btn" onclick="event.stopPropagation();openModal('${id}')">⛶</button>
            <div class="svg-wrap">${getSVG(id)}</div>
            <div class="card-foot"><div class="card-tid" style="color:${CLIENT.secondaryColor}">${id}</div></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function updateUI() {
  const n = selected.size, pct = Math.min(100, Math.round(n/MIN*100)), ready = n >= MIN;
  const p1 = CLIENT.primaryColor;
  document.querySelectorAll('.card').forEach(card => {
    const id = card.id.replace('card-',''), isSel = selected.has(id);
    card.classList.toggle('sel', isSel);
    card.style.borderColor = isSel ? p1 : 'transparent';
    card.style.boxShadow = isSel ? `0 0 0 3px ${p1}28,0 4px 16px rgba(0,0,0,.1)` : '0 1px 6px rgba(0,0,0,.07)';
    document.getElementById('badge-'+id).style.background = p1;
  });
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-fill').style.background = p1;
  document.getElementById('counter').innerHTML = `<strong style="color:${p1}">${n}</strong> sélectionné${n>1?'s':''}`;
  const lbl = document.getElementById('progress-label');
  lbl.textContent = ready ? 'Minimum atteint !' : `Encore ${MIN-n}`;
  lbl.className = 'progress-label'+(ready?' ready':'');
  lbl.style.color = ready ? p1 : '#aaa';
  const btn = document.getElementById('btn-validate');
  btn.disabled = !ready;
  btn.style.background = ready ? p1 : '#e0e0e0';
  btn.style.color = ready ? '#fff' : '#aaa';
  btn.textContent = ready ? `Valider (${n}) →` : `${n}/${MIN} minimum`;
  const fb = document.getElementById('float-bar');
  fb.classList.toggle('show', n>0);
  document.getElementById('float-count').innerHTML = `<strong style="color:${p1}">${n}</strong> template${n>1?'s':''} sélectionné${n>1?'s':''}`;
  const fbtn = document.getElementById('float-validate');
  fbtn.disabled = !ready;
  fbtn.style.background = ready ? p1 : '#555';
  fbtn.textContent = ready ? 'Valider →' : `Encore ${MIN-n}`;
  if (modalId) {
    const mb = document.getElementById('modal-sel-btn');
    mb.style.background = selected.has(modalId) ? '#eee' : p1;
    mb.style.color = selected.has(modalId) ? '#555' : '#fff';
    mb.textContent = selected.has(modalId) ? 'Désélectionner' : 'Sélectionner ✓';
  }
}

function toggle(id) { selected.has(id) ? selected.delete(id) : selected.add(id); updateUI(); }
function selectAll() { STYLES.forEach(s => s.ids.forEach(id => selected.add(id))); updateUI(); }
function clearAll() { selected.clear(); updateUI(); }

function openModal(id) {
  modalId = id;
  document.getElementById('modal-title').textContent = 'Template '+id;
  document.getElementById('modal-body').innerHTML = getSVG(id);
  const mb = document.getElementById('modal-sel-btn');
  mb.style.background = selected.has(id) ? '#eee' : CLIENT.primaryColor;
  mb.style.color = selected.has(id) ? '#555' : '#fff';
  mb.textContent = selected.has(id) ? 'Désélectionner' : 'Sélectionner ✓';
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('show');
    modalId = null;
  }
}
function toggleFromModal() { if (modalId) toggle(modalId); }

async function handleValidate() {
  if (selected.size < MIN) return;
  document.getElementById('loading-overlay').classList.add('show');
  document.getElementById('error-banner').style.display = 'none';
  try {
    const res = await fetch('/api/templates/validate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ clientId: CLIENT_ID, templateIds: [...selected], templateVars: CLIENT }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');
    window.location.href = '/client.html?onboarding=complete';
  } catch(err) {
    document.getElementById('error-banner').textContent = 'Erreur : '+err.message;
    document.getElementById('error-banner').style.display = 'block';
  } finally {
    document.getElementById('loading-overlay').classList.remove('show');
  }
}

initClient();
</script>
